<!doctype html><meta charset="utf-8"><title>Garage Chat</title>
<link rel="stylesheet" href="style.css">
<style>
#log{white-space:pre-wrap;border:1px solid #333;border-radius:8px;padding:12px;min-height:40vh;background:#151515}
.row{display:flex;gap:8px;margin-top:8px}
input,button{padding:.6rem;border-radius:8px;border:1px solid #444;background:#111;color:#eee}
input{flex:1}
.err{color:#f88}
</style>
<main>
  <h1>Garage Chat</h1>
  <div id="status" class="fine">connecting to local bus…</div>
  <div id="log">(waiting for messages…)</div>
  <div class="row">
    <input id="msg" placeholder="type and hit Enter"/>
    <button id="send">Send</button>
  </div>
  <p class="fine">Runs against <code>http://127.0.0.1:8122</code> on this phone. Works offline once installed.</p>
</main>
<script>
const BUS = "http://127.0.0.1:8122";
const POLL_MS = 1500;
const BACKOFF_CAP_MS = 30000;
const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const msgEl = document.getElementById('msg');
let errCount = 0;
async function tail(){
  if(document.hidden){ setTimeout(tail, Math.min(POLL_MS * Math.pow(2, errCount), BACKOFF_CAP_MS)); return; }
  try{
    const r = await fetch(BUS+"/tail?n=120",{cache:'no-store'});
    if(!r.ok) throw new Error(r.status);
    const j = await r.json();
    logEl.textContent = j.lines.join('');
    statusEl.textContent = "connected ✓";
    errCount = 0;
    setTimeout(tail, POLL_MS);
  }catch(e){
    statusEl.innerHTML = '<span class="err">bus not reachable — tap the Termux shortcut "bus_up"</span>';
    errCount++;
    setTimeout(tail, Math.min(POLL_MS * Math.pow(2, errCount), BACKOFF_CAP_MS));
  }
}
async function send(){
  const v = msgEl.value.trim(); if(!v) return;
  msgEl.value = '';
  try{
    const r = await fetch(BUS+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msg:v})});
    if(!r.ok) throw new Error(r.status);
  }catch(e){ alert("send failed: "+e); }
}
document.getElementById('send').onclick = send;
msgEl.addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) tail(); });
tail();
</script>
