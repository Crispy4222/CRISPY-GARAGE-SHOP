<!doctype html><meta charset="utf-8"><title>Garage Chat</title>
<link rel="stylesheet" href="style.css">
<style>
#log{white-space:pre-wrap;border:1px solid #333;border-radius:8px;padding:12px;min-height:40vh;background:#151515}
.row{display:flex;gap:8px;margin-top:8px}
input,button{padding:.6rem;border-radius:8px;border:1px solid #444;background:#111;color:#eee}
input{flex:1}
.err{color:#f88}
</style>
<main>
  <h1>Garage Chat</h1>
  <div id="status" class="fine">connecting to local bus…</div>
  <div id="log">(waiting for messages…)</div>
  <div class="row">
    <input id="msg" placeholder="type and hit Enter"/>
    <button id="send">Send</button>
  </div>
  <p class="fine">Runs against <code>http://127.0.0.1:8122</code> on this phone. Works offline once installed.</p>
</main>
<script>
const BUS_API_BASE_URL = "http://127.0.0.1:8122";
const getElement = (id)=>document.getElementById(id);
async function tail(){
  try{
    const tailResponse = await fetch(BUS_API_BASE_URL+"/tail?n=120",{cache:'no-store'});
    if(!tailResponse.ok) throw new Error(tailResponse.status);
    const tailData = await tailResponse.json();
    getElement('log').textContent = tailData.lines.join('');
    getElement('status').textContent = "connected ✓";
  }catch(tailError){
    getElement('status').innerHTML = '<span class="err">bus not reachable — tap the Termux shortcut “bus_up”</span>';
  } finally {
    setTimeout(tail, 1500);
  }
}
async function send(){
  const messageText = getElement('msg').value.trim(); if(!messageText) return;
  getElement('msg').value = '';
  try{
    const sendResponse = await fetch(BUS_API_BASE_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({msg:messageText})});
    if(!sendResponse.ok) throw new Error(sendResponse.status);
  }catch(sendError){ alert("send failed: "+sendError); }
}
getElement('send').onclick = send;
getElement('msg').addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });
tail();
</script>
