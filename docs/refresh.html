<!doctype html><meta charset="utf-8">
<title>CRISPY Bridge — Refresh</title>
<style>body{font:16px system-ui,Segoe UI,Roboto;color:#eee;background:#111;display:grid;place-items:center;height:100vh} .box{max-width:540px;line-height:1.45} .muted{opacity:.7}</style>
<div class="box">
  <h1>🔄 Updating CRISPY…</h1>
  <p class="muted">Clearing old cache & service worker, then reloading the shop.</p>
</div>
<script>
(async () => {
  try {
    if ('serviceWorker' in navigator) {
      const swRegistrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(swRegistrations.map(swRegistration => swRegistration.unregister()));
    }
    if (window.caches && caches.keys) {
      const cacheKeys = await caches.keys();
      await Promise.all(cacheKeys.map(cacheKey => caches.delete(cacheKey)));
    }
  } catch(cleanupError) {}
  const cacheBustTimestamp = Date.now();
  location.replace('./index.html?v=' + cacheBustTimestamp + '&flush=1');
})();
</script>
