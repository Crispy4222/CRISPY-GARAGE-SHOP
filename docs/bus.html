<!doctype html><meta charset="utf-8"><title>Phoenix Bus</title>
<link rel="stylesheet" href="style.css">
<main>
  <h1>Phoenix Bus</h1>
  <pre id="out">(loading…)</pre>
</main>
<script>
const gistRawUrl = (new URLSearchParams(location.search).get('raw')) || localStorage.getItem('PHX_BUS');
if(!gistRawUrl){ document.getElementById('out').textContent="Set ?raw=<gist raw url> once."; }
else {
  localStorage.setItem('PHX_BUS', gistRawUrl);
  async function tick(){
    try{
      const fetchResponse = await fetch(gistRawUrl, {cache:'no-store'});
      const busData = await fetchResponse.json();
      const recentMessages = busData.say.slice(-8).map(message=>`${message.t}  ${message.msg}`).join('\n');
      document.getElementById('out').textContent = `ts: ${busData.ts}\n\n${recentMessages}`;
    }catch(fetchError){ document.getElementById('out').textContent = 'error: '+fetchError; }
    setTimeout(tick, 5000);
  }
  tick();
}
</script>
